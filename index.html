                            setIsAuthorized(false);
                        }

                                            <button onClick={() => { setSelectedClient(client); setIsHistoryOpen(true); }} className="p-2 bg-background rounded-xl text-text-dim hover:text-brand transition-colors"><Icon name="history" className="w-5 h-5" /></button>

                                    <div className="space-y-6">
                                        <input type="number" value={isPayModalOpen ? paymentAmount : debtAmount} onChange={e => isPayModalOpen ? setPaymentAmount(e.target.value) : setDebtAmount(e.target.value)} className="w-full bg-background p-6 rounded-3xl text-3xl font-black text-center outline-none border-2 border-transparent focus:border-brand" placeholder="0.00" autoFocus />
                                        <button onClick={isPayModalOpen ? submitPayment : submitNewDebt} className={`w-full py-4 rounded-2xl font-bold text-white shadow-lg ${isPayModalOpen ? 'bg-success shadow-emerald-500/20' : 'bg-brand shadow-blue-500/20'}`}>????? ???????</button>
                                    </div>
                                </motion.div>
                            </div>
                        )}

                        {isHistoryOpen && selectedClient && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsHistoryOpen(false)} />
                                <motion.div initial={{ y: 50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 50, opacity: 0 }} className="relative bg-surface w-full max-w-2xl rounded-[40px] max-h-[90vh] flex flex-col overflow-hidden card-shadow">
                                    <div className="p-8 border-b border-border flex justify-between items-center">
                                        <div><h3 className="text-2xl font-black">{selectedClient.name}</h3><p className="text-text-dim text-sm">??? ?????????</p></div>
                                        <div className="flex gap-2">
                                            <button onClick={exportPDF} className="p-3 bg-background rounded-2xl text-brand"><Icon name="file-text" /></button>
                                            <button onClick={() => setIsHistoryOpen(false)} className="p-3 bg-background rounded-2xl text-text-dim"><Icon name="x" /></button>
                                        </div>
                                    </div>
                                    <div id="history-content" className="flex-1 overflow-y-auto p-8 space-y-4">
                                        <div className="grid grid-cols-2 gap-4 mb-8">
                                            <div className="bg-background p-4 rounded-2xl text-center"><p className="text-xs text-text-dim font-bold">?????? ?????</p><p className="text-xl font-black">{selectedClient.total.toLocaleString()}</p></div>
                                            <div className="bg-background p-4 rounded-2xl text-center"><p className="text-xs text-text-dim font-bold">?????? ??????</p><p className="text-xl font-black text-success">{selectedClient.paid.toLocaleString()}</p></div>
                                        </div>
                                        {selectedClient.history.map((h, i) => (
                                            <div key={i} className="flex justify-between items-center p-4 bg-background rounded-2xl border border-border">
                                                <div><p className={`font-black ${h.type === 'payment' ? 'text-success' : 'text-brand'}`}>{h.type === 'payment' ? '?????' : '??? ????'}: {h.amount.toLocaleString()} ?.?</p><p className="text-xs text-text-dim">{h.date} - ??????: {h.user}</p></div>
                                                <Icon name={h.type === 'payment' ? 'check-circle-2' : 'plus'} className={h.type === 'payment' ? 'text-success' : 'text-brand'} />
                                            </div>
                                        ))}
                                    </div>
                                    {user.role === 'admin' && (
                                        <div className="p-8 bg-danger/5 border-t border-danger/10">
                                            <button onClick={async () => { if(confirm('?? ??? ????? ?? ??? ??? ?????? ????????')) { await db.collection('clients').doc(selectedClient.id).delete(); setIsHistoryOpen(false); showToast('?? ??? ??????'); } }} className="w-full py-4 rounded-2xl bg-danger text-white font-bold flex items-center justify-center gap-2"><Icon name="trash-2" /> ??? ?????? ???????</button>
                                        </div>
                                    )}
                                </motion.div>
                            </div>
                        )}

                        {isSettingsOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsSettingsOpen(false)} />
                                <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="relative bg-surface w-full max-w-2xl rounded-[40px] max-h-[90vh] flex flex-col overflow-hidden card-shadow">
                                    <div className="p-8 border-b border-border flex justify-between items-center">
                                        <h3 className="text-2xl font-black">?????????</h3>
                                        <button onClick={() => setIsSettingsOpen(false)} className="p-3 bg-background rounded-2xl text-text-dim"><Icon name="x" /></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-8">
                                        <div className="flex gap-2 mb-8 bg-background p-1 rounded-2xl">
                                            <button onClick={() => setSettingsTab('general')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${settingsTab === 'general' ? 'bg-brand text-white shadow-lg' : 'text-text-dim'}`}>??????</button>
                                            <button onClick={() => setSettingsTab('data')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${settingsTab === 'data' ? 'bg-brand text-white shadow-lg' : 'text-text-dim'}`}>????????</button>
                                            {user.role === 'admin' && (
                                                <React.Fragment>
                                                    <button onClick={() => setSettingsTab('users')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${settingsTab === 'users' ? 'bg-brand text-white shadow-lg' : 'text-text-dim'}`}>??????????</button>
                                                    <button onClick={() => setSettingsTab('whitelist')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${settingsTab === 'whitelist' ? 'bg-brand text-white shadow-lg' : 'text-text-dim'}`}>????</button>
                                                </React.Fragment>
                                            )}
                                        </div>

                                        {settingsTab === 'general' && (
                                            <form onSubmit={async e => { e.preventDefault(); await db.collection('config').doc('main').set({ name: e.target.name.value, logo: e.target.logo.value, info: e.target.info.value }); showToast('?? ??? ?????????'); }} className="space-y-6">
                                                <div><label className="block text-sm font-bold mb-2">??? ??????</label><input name="name" defaultValue={config.name} className="w-full bg-background p-4 rounded-2xl outline-none border-2 border-transparent focus:border-brand" /></div>
                                                <div><label className="block text-sm font-bold mb-2">???? ??????</label><input name="logo" defaultValue={config.logo} className="w-full bg-background p-4 rounded-2xl outline-none border-2 border-transparent focus:border-brand" /></div>
                                                <div><label className="block text-sm font-bold mb-2">??????? ???????</label><input name="info" defaultValue={config.info} className="w-full bg-background p-4 rounded-2xl outline-none border-2 border-transparent focus:border-brand" /></div>
                                                <button type="submit" className="w-full bg-brand text-white py-4 rounded-2xl font-bold">??? ?????????</button>
                                            </form>
                                        )}

                                        {settingsTab === 'data' && (
                                            <div className="space-y-8">
                                                <div className="bg-background p-6 rounded-2xl border border-border">
                                                    <h4 className="font-bold mb-2 flex items-center gap-2"><Icon name="download" className="text-brand" /> ????? ????????</h4>
                                                    <p className="text-sm text-text-dim mb-4">????? ???? ???????? ????? JSON.</p>
                                                    <button onClick={exportData} className="w-full bg-brand text-white py-3 rounded-xl font-bold">????? ??????</button>
                                                </div>
                                                <div className="bg-background p-6 rounded-2xl border border-border">
                                                    <h4 className="font-bold mb-2 flex items-center gap-2"><Icon name="upload" className="text-success" /> ??????? ????????</h4>
                                                    <p className="text-sm text-text-dim mb-4">??? ??? ???? ???????? ???????? ????????.</p>
                                                    <label className="w-full bg-success text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 cursor-pointer">
                                                        <Icon name="upload" /> ?????? ??? ????
                                                        <input type="file" accept=".json" onChange={importData} className="hidden" />
                                                    </label>
                                                </div>
                                            </div>
                                        )}

                                        {settingsTab === 'users' && (
                                            <div className="space-y-6">
                                                <div className="bg-background p-6 rounded-2xl border border-border">
                                                    <h4 className="font-bold mb-4">????? ?????? ????</h4>
                                                    <form onSubmit={async e => { e.preventDefault(); await db.collection('users').add({ username: e.target.u.value, password: e.target.p.value, role: 'user' }); e.target.reset(); showToast('?? ????? ????????'); }} className="space-y-4">
                                                        <input name="u" placeholder="??? ????????" className="w-full bg-surface p-3 rounded-xl outline-none border border-border" required />
                                                        <input name="p" placeholder="???? ??????" className="w-full bg-surface p-3 rounded-xl outline-none border border-border" required />
                                                        <button type="submit" className="w-full bg-brand text-white py-3 rounded-xl font-bold">?????</button>
                                                    </form>
                                                </div>
                                                <div className="space-y-2">
                                                    {appUsers.map(u => (
                                                        <div key={u.id} className="flex justify-between items-center p-4 bg-background rounded-2xl border border-border">
                                                            <div><p className="font-bold">{u.username}</p><p className="text-xs text-text-dim">?????: {u.role}</p></div>
                                                            <button onClick={async () => { if(confirm('??? ?????????')) await db.collection('users').doc(u.id).delete(); }} className="text-danger p-2"><Icon name="trash-2" /></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {settingsTab === 'whitelist' && (
                                            <div className="space-y-6">
                                                <div className="bg-background p-6 rounded-2xl border border-border">
                                                    <h4 className="font-bold mb-4">????? ????? ???? ???? ??</h4>
                                                    <form onSubmit={async e => { e.preventDefault(); const email = e.target.e.value; const newWhitelist = [...whitelist, email]; await db.collection('settings').doc('whitelist').set({ emails: newWhitelist }); e.target.reset(); showToast('?? ????? ???????'); }} className="flex gap-2">
                                                        <input name="e" type="email" placeholder="example@gmail.com" className="flex-1 bg-surface p-3 rounded-xl outline-none border border-border" required />
                                                        <button type="submit" className="bg-brand text-white px-6 rounded-xl font-bold">?????</button>
                                                    </form>
                                                </div>
                                                <div className="space-y-2">
                                                    {whitelist.map(email => (
                                                        <div key={email} className="flex justify-between items-center p-4 bg-background rounded-2xl border border-border">
                                                            <span className="font-bold">{email}</span>
                                                            <button onClick={async () => { const newWhitelist = whitelist.filter(e => e !== email); await db.collection('settings').doc('whitelist').set({ emails: newWhitelist }); }} className="text-danger p-2"><Icon name="trash-2" /></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    {/* Toast */}
                    <AnimatePresence>
                        {toast && (
                            <motion.div initial={{ opacity: 0, y: 50, x: '-50%' }} animate={{ opacity: 1, y: 0, x: '-50%' }} exit={{ opacity: 0, y: 50, x: '-50%' }} className={`fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] border border-white/10 ${toast.type === 'success' ? 'bg-success text-white' : 'bg-danger text-white'}`}>
                                <Icon name={toast.type === 'success' ? 'check-circle-2' : 'alert-circle'} className="w-5 h-5" />
                                <span className="font-bold">{toast.message}</span>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
