<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الديون المتكامل | النسخة الاحترافية</title>
    
    <meta name="theme-color" content="#2563eb">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#2563eb',
                        surface: 'var(--surface)',
                        background: 'var(--background)',
                        border: 'var(--border)',
                        text: 'var(--text-main)',
                    },
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                }
            }
        }
    </script>

    <style>
        :root { --background: #f8fafc; --surface: #ffffff; --border: #e2e8f0; --text-main: #0f172a; }
        .dark { --background: #020617; --surface: #0f172a; --border: #1e293b; --text-main: #f1f5f9; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--background); color: var(--text-main); transition: 0.3s; margin: 0; direction: rtl; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, onSnapshot, addDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            projectId: "sunlit-segment-470307-f7",
            apiKey: "AIzaSyB_tprVFg33vOgg2l0941_cil7glyqYYRk",
            authDomain: "sunlit-segment-470307-f7.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-5cff9370-970c-408a-bf68-0eb47a873db5"
        };

        const app = initializeApp(firebaseConfig);
        const firestore = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        window.fb = { db: firestore, auth: getAuth(app), googleProvider: new GoogleAuthProvider(), collection, doc, getDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, where, increment, arrayUnion, serverTimestamp, signOut, signInWithPopup, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.FramerMotion;
        const { db, auth, googleProvider, collection, doc, increment, arrayUnion, serverTimestamp } = window.fb;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');
            const [selectedClientId, setSelectedClientId] = useState(null);
            const [modals, setModals] = useState({ add: false, pay: false, debt: false, history: false });
            const [amount, setAmount] = useState('');
            const [note, setNote] = useState('');

            useEffect(() => {
                const unsub = window.fb.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return unsub;
            }, []);

            useEffect(() => {
                if (!user) return;
                return window.fb.onSnapshot(window.fb.query(collection(db, 'clients'), window.fb.orderBy('name')), snap => {
                    setClients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const activeClient = useMemo(() => clients.find(c => c.id === selectedClientId), [clients, selectedClientId]);

            const handleTransaction = async (type) => {
                const val = parseFloat(amount);
                if (!activeClient || isNaN(val)) return;

                const clientRef = doc(db, 'clients', activeClient.id);
                const trans = { amount: val, note, type, date: new Date().toLocaleString('ar-EG'), user: user.displayName };
                
                await window.fb.updateDoc(clientRef, {
                    [type === 'payment' ? 'paid' : 'total']: increment(val),
                    history: arrayUnion(trans)
                });
                
                setModals({ ...modals, pay: false, debt: false });
                setAmount(''); setNote('');
            };

            const downloadPDF = () => {
                const element = document.getElementById('report-area');
                const opt = { margin: 1, filename: `كشف_حساب_${activeClient.name}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
                html2pdf().set(opt).from(element).save();
            };

            const sendWhatsApp = () => {
                const balance = activeClient.total - activeClient.paid;
                const text = `تحية طيبة، كشف حساب العميل: ${activeClient.name}%0Aالمبلغ المتبقي: ${balance} ج.م%0Aشكراً لتعاملكم معنا.`;
                window.open(`https://wa.me/?text=${text}`, '_blank');
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><div className="w-10 h-10 border-4 border-brand border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-background">
                    <div className="bg-surface p-10 rounded-[40px] shadow-2xl text-center max-w-sm w-full border border-border">
                        <Icon name="shield-check" className="w-16 h-16 text-brand mx-auto mb-6" />
                        <h2 className="text-2xl font-black mb-6">تسجيل الدخول للنظام</h2>
                        <button onClick={() => window.fb.signInWithPopup(googleProvider)} className="w-full bg-brand text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg">
                            <Icon name="log-in" /> دخول عبر جوجل
                        </button>
                    </div>
                </div>
            );

            return (
                <div className={isDarkMode ? 'dark' : ''}>
                    <div className="min-h-screen bg-background text-text transition-colors">
                        <header className="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-brand rounded-xl flex items-center justify-center text-white font-black">M</div>
                                <h1 className="text-xl font-black">مصنع مصطفى عبد الرحمن</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 hover:bg-black/5 rounded-xl transition-colors"><Icon name={isDarkMode ? 'sun' : 'moon'} /></button>
                                <button onClick={() => window.fb.signOut(window.fb.auth)} className="p-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors"><Icon name="log-out" /></button>
                            </div>
                        </header>

                        <main className="max-w-6xl mx-auto p-6 space-y-8">
                            {/* Stats Summary */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-brand text-white p-8 rounded-[35px] shadow-xl shadow-brand/20 relative overflow-hidden">
                                    <p className="opacity-80 font-bold mb-1">إجمالي المديونيات</p>
                                    <h2 className="text-3xl font-black">{(clients.reduce((a, c) => a + (c.total - c.paid), 0)).toLocaleString()} ج.م</h2>
                                    <Icon name="trending-up" className="absolute -bottom-4 -left-4 w-24 h-24 opacity-10" />
                                </div>
                                <div className="bg-surface p-8 rounded-[35px] border border-border shadow-sm flex items-center gap-5">
                                    <div className="w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center"><Icon name="users" /></div>
                                    <div><p className="text-gray-400 font-bold">قاعدة العملاء</p><h2 className="text-2xl font-black">{clients.length} عميل</h2></div>
                                </div>
                            </div>

                            {/* Client Actions */}
                            <div className="flex flex-wrap gap-4 items-center justify-between">
                                <h2 className="text-2xl font-black">قائمة العملاء</h2>
                                <button onClick={() => setModals({ ...modals, add: true })} className="bg-brand text-white px-8 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-brand/30">
                                    <Icon name="plus" /> إضافة عميل جديد
                                </button>
                            </div>

                            {/* Clients Grid */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {clients.map(c => {
                                    const balance = c.total - c.paid;
                                    return (
                                        <motion.div layout key={c.id} className="bg-surface p-6 rounded-[30px] border border-border hover:border-brand shadow-sm transition-all group">
                                            <div className="flex justify-between items-start mb-4">
                                                <h3 className="text-lg font-black group-hover:text-brand transition-colors">{c.name}</h3>
                                                <button onClick={() => { setSelectedClientId(c.id); setModals({ ...modals, history: true }); }} className="p-2 bg-background rounded-lg text-gray-400 hover:text-brand"><Icon name="file-text" className="w-5 h-5" /></button>
                                            </div>
                                            <div className="mb-6">
                                                <p className="text-xs text-gray-400 font-bold mb-1 uppercase">الرصيد الحالي</p>
                                                <div className={`text-2xl font-black ${balance >= 0 ? 'text-brand' : 'text-green-500'}`}>
                                                    {Math.abs(balance).toLocaleString()} <span className="text-sm">ج.م</span>
                                                    <span className="text-[10px] mr-2 opacity-60">{balance >= 0 ? '(دين)' : '(عربون)'}</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setSelectedClientId(c.id); setModals({ ...modals, pay: true }); }} className="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold text-sm shadow-md shadow-green-200">تحصيل</button>
                                                <button onClick={() => { setSelectedClientId(c.id); setModals({ ...modals, debt: true }); }} className="flex-1 bg-background border border-border py-3 rounded-xl font-bold text-sm hover:bg-border transition-colors">دين جديد</button>
                                            </div>
                                        </motion.div>
                                    );
                                })}
                            </div>
                        </main>

                        {/* History Modal (Integrated PDF & WhatsApp) */}
                        <AnimatePresence>
                            {modals.history && activeClient && (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="bg-surface w-full max-w-2xl rounded-[35px] overflow-hidden shadow-2xl">
                                        <div className="p-6 border-b border-border flex justify-between items-center bg-background/50">
                                            <h3 className="text-xl font-black">كشف حساب: {activeClient.name}</h3>
                                            <div className="flex gap-2">
                                                <button onClick={downloadPDF} className="p-2 text-brand hover:bg-brand/10 rounded-lg"><Icon name="download" /></button>
                                                <button onClick={sendWhatsApp} className="p-2 text-green-500 hover:bg-green-50 rounded-lg"><Icon name="message-circle" /></button>
                                                <button onClick={() => setModals({ ...modals, history: false })} className="p-2 text-gray-400 hover:bg-gray-100 rounded-lg"><Icon name="x" /></button>
                                            </div>
                                        </div>
                                        <div id="report-area" className="p-8 max-h-[60vh] overflow-y-auto space-y-4 no-scrollbar">
                                            <div className="flex justify-between p-4 bg-brand/5 rounded-2xl border border-brand/10">
                                                <div className="text-center flex-1 border-l border-brand/10"><p className="text-xs font-bold text-gray-400">إجمالي السحب</p><p className="font-black">{activeClient.total} ج.م</p></div>
                                                <div className="text-center flex-1 border-l border-brand/10"><p className="text-xs font-bold text-gray-400">إجمالي المدفوع</p><p className="font-black text-green-600">{activeClient.paid} ج.م</p></div>
                                                <div className="text-center flex-1"><p className="text-xs font-bold text-gray-400">المتبقي</p><p className="font-black text-brand">{activeClient.total - activeClient.paid} ج.م</p></div>
                                            </div>
                                            <table className="w-full text-right">
                                                <thead><tr className="text-gray-400 text-xs border-b border-border"><th className="pb-3">التاريخ</th><th className="pb-3">النوع</th><th className="pb-3">المبلغ</th><th className="pb-3">بواسطة</th></tr></thead>
                                                <tbody className="text-sm">
                                                    {(activeClient.history || []).slice().reverse().map((h, i) => (
                                                        <tr key={i} className="border-b border-border/50">
                                                            <td className="py-4">{h.date.split(',')[0]}</td>
                                                            <td className="py-4"><span className={`px-2 py-1 rounded-md text-[10px] font-bold ${h.type === 'payment' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>{h.type === 'payment' ? 'تحصيل' : 'دين'}</span></td>
                                                            <td className="py-4 font-bold">{h.amount} ج.م</td>
                                                            <td className="py-4 text-gray-400 text-xs">{h.user}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </motion.div>
                                </div>
                            )}

                            {/* Add Debt/Payment Modals */}
                            {(modals.pay || modals.debt) && (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                                    <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="bg-surface w-full max-w-sm rounded-[35px] p-8 shadow-2xl">
                                        <h3 className="text-2xl font-black mb-6 text-center">{modals.pay ? 'تسجيل تحصيل' : 'تسجيل مديونية'}</h3>
                                        <div className="space-y-4">
                                            <input type="number" placeholder="المبلغ" value={amount} onChange={e => setAmount(e.target.value)} className="w-full p-4 bg-background border-2 border-transparent focus:border-brand rounded-2xl outline-none transition-all" />
                                            <input type="text" placeholder="ملاحظات (اختياري)" value={note} onChange={e => setNote(e.target.value)} className="w-full p-4 bg-background border-2 border-transparent focus:border-brand rounded-2xl outline-none transition-all" />
                                            <button onClick={() => handleTransaction(modals.pay ? 'payment' : 'debt')} className={`w-full py-4 rounded-2xl font-bold text-white shadow-lg transition-transform active:scale-95 ${modals.pay ? 'bg-green-500 shadow-green-200' : 'bg-brand shadow-brand/20'}`}>تأكيد العملية</button>
                                            <button onClick={() => setModals({ ...modals, pay: false, debt: false })} className="w-full py-4 rounded-2xl font-bold text-gray-400">إلغاء</button>
                                        </div>
                                    </motion.div>
                                </div>
                            )}
                        </AnimatePresence>

                        {/* Toast Notification (Simple Implementation) */}
                        <div className="fixed bottom-6 left-6 z-[200]">
                             {/* Add logic for auto-disappearing toasts here */}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
