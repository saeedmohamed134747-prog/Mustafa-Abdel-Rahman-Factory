<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الديون - مصنع مصطفى عبد الرحمن</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#2563eb',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        surface: 'var(--surface)',
                        background: 'var(--background)',
                    },
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border-color: rgba(0, 0, 0, 0.05);
        }

        .dark {
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--background);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .dark .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Firebase Configuration
        const firebaseConfig = {
            projectId: "sunlit-segment-470307-f7",
            appId: "1:959418264422:web:4343a18641c476838bb6a7",
            apiKey: "AIzaSyB_tprVFg33vOgg2l0941_cil7glyqYYRk",
            authDomain: "sunlit-segment-470307-f7.firebaseapp.com",
            storageBucket: "sunlit-segment-470307-f7.firebasestorage.app",
            messagingSenderId: "959418264422"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // Components
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [loading, setLoading] = useState(true);
            const [clients, setClients] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(localStorage.getItem('theme') === 'dark');
            const [selectedClient, setSelectedClient] = useState(null);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [isPayModalOpen, setIsPayModalOpen] = useState(false);
            const [isAddDebtModalOpen, setIsAddDebtModalOpen] = useState(false);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [amount, setAmount] = useState('');
            const [toast, setToast] = useState(null);

            const config = {
                name: 'مصنع مصطفى عبد الرحمن',
                logo: 'https://cdn-icons-png.flaticon.com/512/1532/1532688.png',
                info: 'تواصل: 0123456789'
            };

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const defaultAdmin = "saeedmohamed131846@gmail.com";
                        setUser({ email: u.email, displayName: u.displayName, role: u.email === defaultAdmin ? 'admin' : 'user' });
                        setIsAuthorized(true);
                    } else {
                        setIsAuthorized(false);
                    }
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            useEffect(() => {
                if (!isAuthorized) return;
                const unsub = db.collection('clients').onSnapshot(snap => {
                    setClients(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return unsub;
            }, [isAuthorized]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleLogin = () => auth.signInWithPopup(googleProvider);
            const handleLogout = () => auth.signOut();

            const addClient = async (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const total = parseFloat(e.target.total.value);
                const initialTransaction = { amount: total, user: user.displayName, date: new Date().toLocaleString('ar-EG'), type: 'debt' };
                await db.collection('clients').add({
                    name, total, paid: 0, history: [initialTransaction], createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setIsAddModalOpen(false);
                showToast('تمت الإضافة');
            };

            const handleTransaction = async (type) => {
                const val = parseFloat(amount);
                if (!val || !selectedClient) return;
                const updates = type === 'payment' 
                    ? { paid: selectedClient.paid + val } 
                    : { total: selectedClient.total + val };
                
                const newTransaction = { amount: val, user: user.displayName, date: new Date().toLocaleString('ar-EG'), type };
                await db.collection('clients').doc(selectedClient.id).update({
                    ...updates,
                    history: [newTransaction, ...selectedClient.history]
                });
                setIsPayModalOpen(false);
                setIsAddDebtModalOpen(false);
                setAmount('');
                showToast('تم التحديث');
            };

            const deleteTransaction = async (index) => {
                if (!confirm('حذف هذه المعاملة؟')) return;
                const transaction = selectedClient.history[index];
                const newHistory = [...selectedClient.history];
                newHistory.splice(index, 1);
                const updates = transaction.type === 'payment' 
                    ? { paid: selectedClient.paid - transaction.amount }
                    : { total: selectedClient.total - transaction.amount };
                await db.collection('clients').doc(selectedClient.id).update({ ...updates, history: newHistory });
                setSelectedClient(prev => ({ ...prev, ...updates, history: newHistory }));
                showToast('تم الحذف');
            };

            const calculateRunningBalance = (history, initial) => {
                let current = 0;
                return [...history].reverse().map(h => {
                    if (h.type === 'payment') current -= h.amount;
                    else current += h.amount;
                    return { ...h, balance: current };
                }).reverse();
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><Icon name="loader-2" className="animate-spin text-brand w-12 h-12" /></div>;

            if (!isAuthorized) return (
                <div className="h-screen flex items-center justify-center p-4">
                    <div className="bg-surface p-8 rounded-[40px] card-shadow w-full max-w-md text-center border border-border">
                        <img src={config.logo} className="w-20 h-20 mx-auto mb-6 rounded-2xl" />
                        <h1 className="text-2xl font-black mb-8">{config.name}</h1>
                        <button onClick={handleLogin} className="w-full bg-brand text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                            <Icon name="log-in" className="w-5 h-5" /> الدخول بواسطة جوجل
                        </button>
                    </div>
                </div>
            );

            const totalDebt = clients.reduce((a, c) => a + (c.total - c.paid), 0);

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-surface border-b border-border sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <img src={config.logo} className="w-10 h-10 rounded-xl" />
                            <h1 className="font-black text-xl">{config.name}</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 hover:bg-background rounded-xl">
                                <Icon name={isDarkMode ? 'sun' : 'moon'} className="w-6 h-6" />
                            </button>
                            <button onClick={handleLogout} className="p-2 text-danger hover:bg-danger/10 rounded-xl">
                                <Icon name="log-out" className="w-6 h-6" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-surface p-8 rounded-[32px] card-shadow border border-border">
                                <p className="text-text-dim text-sm font-bold mb-2">إجمالي الديون المستحقة</p>
                                <h2 className="text-3xl font-black text-brand">{totalDebt.toLocaleString()} ج.م</h2>
                            </div>
                            <div className="bg-surface p-8 rounded-[32px] card-shadow border border-border md:col-span-2 flex items-center justify-between">
                                <div className="relative flex-1 max-w-md">
                                    <Icon name="search" className="absolute right-4 top-1/2 -translate-y-1/2 text-text-dim w-5 h-5" />
                                    <input placeholder="ابحث عن عميل..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-background rounded-2xl py-3 pr-12 pl-4 outline-none border border-transparent focus:border-brand" />
                                </div>
                                <button onClick={() => setIsAddModalOpen(true)} className="bg-brand text-white px-8 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg mr-4">
                                    <Icon name="plus" className="w-5 h-5" /> إضافة عميل
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {clients.filter(c => c.name.includes(searchTerm)).map(c => (
                                <div key={c.id} className="bg-surface p-6 rounded-[32px] card-shadow border border-border hover:border-brand transition-all group">
                                    <div className="flex justify-between items-start mb-6">
                                        <h3 className="text-xl font-black">{c.name}</h3>
                                        <button onClick={() => { setSelectedClient(c); setIsHistoryOpen(true); }} className="p-2 bg-background rounded-xl text-text-dim hover:text-brand">
                                            <Icon name="history" className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="mb-8">
                                        <p className="text-text-dim text-xs font-bold mb-1">المبلغ المتبقي</p>
                                        <div className="text-3xl font-black text-brand">{(c.total - c.paid).toLocaleString()} ج.م</div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => { setSelectedClient(c); setIsPayModalOpen(true); }} className="flex-1 bg-success text-white py-3 rounded-2xl font-bold shadow-lg shadow-success/20">تحصيل</button>
                                        <button onClick={() => { setSelectedClient(c); setIsAddDebtModalOpen(true); }} className="flex-1 bg-background border border-border py-3 rounded-2xl font-bold">دين جديد</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modals */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
                            <div className="bg-surface w-full max-w-md rounded-[32px] p-8 card-shadow">
                                <h3 className="text-2xl font-black mb-6">إضافة عميل جديد</h3>
                                <form onSubmit={addClient} className="space-y-4">
                                    <input name="name" placeholder="اسم العميل" required className="w-full bg-background p-4 rounded-2xl outline-none border border-transparent focus:border-brand" />
                                    <input name="total" type="number" placeholder="المبلغ الابتدائي" required className="w-full bg-background p-4 rounded-2xl outline-none border border-transparent focus:border-brand" />
                                    <div className="flex gap-3 mt-6">
                                        <button type="submit" className="flex-1 bg-brand text-white py-4 rounded-2xl font-bold">حفظ</button>
                                        <button type="button" onClick={() => setIsAddModalOpen(false)} className="flex-1 bg-background py-4 rounded-2xl font-bold">إلغاء</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {(isPayModalOpen || isAddDebtModalOpen) && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
                            <div className="bg-surface w-full max-w-sm rounded-[32px] p-8 card-shadow text-center">
                                <h3 className="text-2xl font-black mb-2">{isPayModalOpen ? 'تحصيل مبلغ' : 'إضافة دين'}</h3>
                                <p className="text-text-dim mb-6">{selectedClient?.name}</p>
                                <input type="number" value={amount} onChange={e => setAmount(e.target.value)} className="w-full bg-background p-6 rounded-3xl text-4xl font-black text-center outline-none mb-6" placeholder="0" autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => handleTransaction(isPayModalOpen ? 'payment' : 'debt')} className={`flex-1 py-4 rounded-2xl font-bold text-white ${isPayModalOpen ? 'bg-success' : 'bg-brand'}`}>تأكيد</button>
                                    <button onClick={() => { setIsPayModalOpen(false); setIsAddDebtModalOpen(false); setAmount(''); }} className="flex-1 bg-background py-4 rounded-2xl font-bold">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isHistoryOpen && selectedClient && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
                            <div className="bg-surface w-full max-w-3xl rounded-[40px] max-h-[90vh] flex flex-col overflow-hidden card-shadow">
                                <div className="p-6 border-b border-border flex justify-between items-center">
                                    <h3 className="text-xl font-black">سجل المعاملات: {selectedClient.name}</h3>
                                    <button onClick={() => setIsHistoryOpen(false)} className="p-2 bg-background rounded-xl"><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6">
                                    <div className="grid grid-cols-3 gap-4 mb-8">
                                        <div className="bg-brand/5 p-4 rounded-2xl text-center border border-brand/10">
                                            <p className="text-[10px] font-bold text-text-dim">المديونية</p>
                                            <p className="text-xl font-black text-brand">{selectedClient.total.toLocaleString()}</p>
                                        </div>
                                        <div className="bg-success/5 p-4 rounded-2xl text-center border border-success/10">
                                            <p className="text-[10px] font-bold text-text-dim">التحصيل</p>
                                            <p className="text-xl font-black text-success">{selectedClient.paid.toLocaleString()}</p>
                                        </div>
                                        <div className="bg-danger/5 p-4 rounded-2xl text-center border border-danger/10">
                                            <p className="text-[10px] font-bold text-text-dim">المتبقي</p>
                                            <p className="text-xl font-black text-danger">{(selectedClient.total - selectedClient.paid).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <table className="w-full text-right">
                                        <thead className="text-text-dim text-xs font-bold border-b border-border">
                                            <tr>
                                                <th className="p-4">التاريخ</th>
                                                <th className="p-4">المعاملة</th>
                                                <th className="p-4">المبلغ</th>
                                                <th className="p-4">الرصيد</th>
                                                <th className="p-4">إجراء</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-border">
                                            {calculateRunningBalance(selectedClient.history, 0).map((h, i) => (
                                                <tr key={i} className="hover:bg-background/50 transition-colors">
                                                    <td className="p-4 text-xs">{h.date.split(',')[0]}</td>
                                                    <td className="p-4 font-bold">{h.type === 'payment' ? 'تحصيل' : 'دين'}</td>
                                                    <td className={`p-4 font-black ${h.type === 'payment' ? 'text-success' : 'text-brand'}`}>{h.amount.toLocaleString()}</td>
                                                    <td className="p-4 font-black">{h.balance.toLocaleString()}</td>
                                                    <td className="p-4">
                                                        <button onClick={() => deleteTransaction(i)} className="p-2 text-danger hover:bg-danger/10 rounded-lg">
                                                            <Icon name="trash-2" className="w-4 h-4" />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl text-white font-bold z-[100] flex items-center gap-3 ${toast.type === 'success' ? 'bg-success' : 'bg-danger'}`}>
                            <Icon name={toast.type === 'success' ? 'check-circle' : 'alert-circle'} />
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
