<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الديون</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f8fafc; margin: 0; direction: rtl; }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="app">
        <!-- شاشة التحميل الأولية -->
        <div id="status-container" class="flex flex-col items-center justify-center h-screen gap-4 p-6 text-center">
            <div id="loader-icon" class="spinner"></div>
            <p id="status-text" class="font-bold text-blue-600">جاري تشغيل النظام...</p>
            <div id="error-box" class="hidden bg-red-50 border border-red-200 p-6 rounded-2xl max-w-md">
                <p class="text-red-700 font-bold mb-2">حدث خطأ أثناء التشغيل:</p>
                <p id="error-message" class="text-red-600 text-sm break-all"></p>
                <button onclick="window.location.reload()" class="mt-4 bg-red-600 text-white px-6 py-2 rounded-xl text-sm">إعادة تحميل الصفحة</button>
            </div>
        </div>
    </div>

    <script>
        // دالة لعرض الأخطاء على الشاشة
        function showError(msg) {
            document.getElementById('loader-icon').classList.add('hidden');
            document.getElementById('status-text').classList.add('hidden');
            document.getElementById('error-box').classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
            console.error("App Error:", msg);
        }

        try {
            // إعدادات Firebase
            const firebaseConfig = {
                projectId: "sunlit-segment-470307-f7",
                appId: "1:959418264422:web:4343a18641c476838bb6a7",
                apiKey: "AIzaSyB_tprVFg33vOgg2l0941_cil7glyqYYRk",
                authDomain: "sunlit-segment-470307-f7.firebaseapp.com"
            };

            // معرف قاعدة البيانات الخاص بك (مهم جداً)
            const databaseId = "ai-studio-5cff9370-970c-408a-bf68-0eb47a873db5";

            // التحقق من تحميل المكتبات
            if (typeof firebase === 'undefined') throw new Error("فشل تحميل مكتبة Firebase. تأكد من اتصال الإنترنت.");

            // تهيئة Firebase
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            
            // الوصول لقاعدة البيانات المحددة
            const db = firebase.app().firestore(databaseId);
            const auth = firebase.auth();
            const provider = new firebase.auth.GoogleAuthProvider();

            const appDiv = document.getElementById('app');
            let clients = [];

            // الدوال الأساسية
            window.login = () => auth.signInWithPopup(provider).catch(err => showError("خطأ في تسجيل الدخول: " + err.message));
            window.logout = () => auth.signOut();

            // مراقبة حالة الدخول
            auth.onAuthStateChanged(user => {
                if (user) {
                    renderDashboard(user);
                    // جلب البيانات
                    db.collection('clients').onSnapshot(snapshot => {
                        clients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        updateUI();
                    }, err => showError("خطأ في قاعدة البيانات: " + err.message));
                } else {
                    renderLogin();
                }
            });

            function renderLogin() {
                appDiv.innerHTML = `
                    <div class="flex items-center justify-center h-screen p-4">
                        <div class="card w-full max-w-md text-center shadow-2xl p-10">
                            <h1 class="text-3xl font-black mb-8">نظام إدارة الديون</h1>
                            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                                دخول بحساب جوجل
                            </button>
                        </div>
                    </div>
                `;
            }

            function renderDashboard(user) {
                appDiv.innerHTML = `
                    <div class="min-h-screen p-6">
                        <header class="flex justify-between items-center mb-10 max-w-7xl mx-auto">
                            <h1 class="text-2xl font-black">🏦 إدارة الديون</h1>
                            <button onclick="logout()" class="text-red-500 font-bold">خروج</button>
                        </header>
                        <div class="max-w-7xl mx-auto">
                            <div id="stats" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10"></div>
                            <div id="list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                        </div>
                    </div>
                `;
            }

            function updateUI() {
                const stats = document.getElementById('stats');
                const list = document.getElementById('list');
                if (!stats || !list) return;

                const total = clients.reduce((a, c) => a + ((c.total || 0) - (c.paid || 0)), 0);
                stats.innerHTML = `
                    <div class="card"><p class="text-slate-500 font-bold">إجمالي الديون</p><h2 class="text-3xl font-black text-blue-600">${total.toLocaleString()} ج.م</h2></div>
                    <div class="card"><p class="text-slate-500 font-bold">عدد العملاء</p><h2 class="text-3xl font-black">${clients.length}</h2></div>
                `;

                list.innerHTML = clients.map(c => `
                    <div class="card">
                        <h3 class="text-xl font-black mb-2">${c.name}</h3>
                        <p class="text-2xl font-bold text-blue-600">${((c.total || 0) - (c.paid || 0)).toLocaleString()} ج.م</p>
                    </div>
                `).join('');
            }

        } catch (err) {
            showError(err.message);
        }
    </script>
</body>
</html>
