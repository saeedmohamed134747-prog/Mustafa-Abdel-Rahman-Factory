<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الديون والعربون | النسخة الاحترافية</title>
    <meta name="theme-color" content="#2563eb">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: {
                        brand: '#2563eb', 'brand-soft': '#eff6ff',
                        success: '#10b981', 'success-soft': '#ecfdf5',
                        warning: '#f59e0b', 'warning-soft': '#fffbeb',
                        danger: '#ef4444', 'danger-soft': '#fef2f2',
                        surface: '#ffffff', background: '#f8fafc',
                        text: '#0f172a', 'text-dim': '#64748b',
                        border: '#e2e8f0'
                    }
                }
            }
        }
    </script>

    <!-- Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        
        .dark {
            --surface: #0f172a; --background: #020617;
            --text: #f8fafc; --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            background-color: theme('colors.background'); 
            color: theme('colors.text');
            font-family: 'Tajawal', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .dark body { background-color: var(--background); color: var(--text); }
        .dark .bg-surface { background-color: var(--surface); border-color: var(--border); }
        .dark .border-border { border-color: var(--border); }
        .dark .bg-background { background-color: var(--background); }
        
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .dark .card-shadow { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.5); }

        @media print {
            .no-print, header { display: none !important; }
            body, html, #root { background: white !important; color: black !important; margin: 0; padding: 0; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #ccc; padding: 8px; text-align: right; }
            .dark table, .dark th, .dark td { border-color: #ccc; color: black; }
        }
    </style>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@11.0.3/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>

    <!-- Firebase Compat (Stable for Browser) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // استخراج المكتبات من المتصفح
        const { useState, useEffect, useMemo } = React;
        const { createRoot } = ReactDOM;
        const { motion, AnimatePresence } = window.Motion;
        const Lucide = window.lucide;

        // إعدادات Firebase
        const firebaseConfig = {
          projectId: "sunlit-segment-470307-f7",
          appId: "1:959418264422:web:4343a18641c476838bb6a7",
          apiKey: "AIzaSyB_tprVFg33vOgg2l0941_cil7glyqYYRk",
          authDomain: "sunlit-segment-470307-f7.firebaseapp.com",
          firestoreDatabaseId: "ai-studio-5cff9370-970c-408a-bf68-0eb47a873db5",
          storageBucket: "sunlit-segment-470307-f7.firebasestorage.app",
          messagingSenderId: "959418264422"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();
const formatDate = (dateStr) => {
          try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleString('ar-EG');
          } catch {
            return dateStr;
          }
        };

        function App() {
          const [user, setUser] = useState(null);
          const [isAuthorized, setIsAuthorized] = useState(false);
          const [authError, setAuthError] = useState(null);
          const [loginMode, setLoginMode] = useState('google');
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [clients, setClients] = useState([]);
          const [config, setConfig] = useState({
            name: 'مصنع مصطفى عبد الرحمن',
            logo: 'https://cdn-icons-png.flaticon.com/512/1532/1532688.png',
            info: 'تواصل: 0123456789'
          });
          const [loading, setLoading] = useState(true);
          const [searchTerm, setSearchTerm] = useState('');
          const [isAddModalOpen, setIsAddModalOpen] = useState(false);
          const [selectedClientId, setSelectedClientId] = useState(null);
          const [isPayModalOpen, setIsPayModalOpen] = useState(false);
          const [isAddDebtModalOpen, setIsAddDebtModalOpen] = useState(false);
          const [isHistoryOpen, setIsHistoryOpen] = useState(false);
          const [amount, setAmount] = useState('');
          const [notes, setNotes] = useState('');
          const [toast, setToast] = useState(null);
          const [isDarkMode, setIsDarkMode] = useState(() => {
            return localStorage.getItem('theme') === 'dark' || 
              (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
          });

          const selectedClient = useMemo(() => clients.find(c => c.id === selectedClientId), [clients, selectedClientId]);

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
              localStorage.setItem('theme', 'dark');
            } else {
              document.documentElement.classList.remove('dark');
              localStorage.setItem('theme', 'light');
            }
          }, [isDarkMode]);

          useEffect(() => {
            const unsubscribe = auth.onAuthStateChanged(async (u) => {
              if (u) {
                try {
                  const whitelistDoc = await db.collection('settings').doc('whitelist').get();
                  const allowedEmails = whitelistDoc.exists ? whitelistDoc.data().emails || [] : [];
                  const defaultAdmin = "saeedmohamed131846@gmail.com";
                  
                  if (u.email === defaultAdmin || allowedEmails.includes(u.email)) {
                    setUser({
                      uid: u.uid,
                      displayName: u.displayName || u.email,
                      email: u.email,
                      role: u.email === defaultAdmin ? 'admin' : 'user'
                    });
                    setIsAuthorized(true);
                  } else {
                    setAuthError('عذراً، هذا الحساب غير مصرح له بالدخول.');
                    auth.signOut();
                  }
                } catch (error) {
                  if (u.email === "saeedmohamed131846@gmail.com") {
                    setUser({ uid: u.uid, displayName: u.displayName || u.email, email: u.email, role: 'admin' });
                    setIsAuthorized(true);
                  }
                }
              } else {
                const savedUser = localStorage.getItem('customUser');
                if (savedUser) {
                  setUser(JSON.parse(savedUser));
                  setIsAuthorized(true);
                } else {
                  setUser(null);
                  setIsAuthorized(false);
                }
              }
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!isAuthorized) return;

            const unsubClients = db.collection('clients').orderBy('name').onSnapshot((snapshot) => {
              setClients(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, (err) => console.error('Clients error:', err));

            const unsubConfig = db.collection('config').doc('main').onSnapshot((doc) => {
              if (doc.exists) setConfig(doc.data());
            }, (err) => console.error('Config error:', err));

            return () => {
              unsubClients();
              unsubConfig();
            };
          }, [isAuthorized]);

          const handleGoogleLogin = async () => {
            setLoading(true);
            setAuthError(null);
            try {
              await auth.signInWithPopup(googleProvider);
            } catch (error) {
              if (error.code !== 'auth/popup-closed-by-user') {
                setAuthError('فشل تسجيل الدخول بواسطة جوجل');
              }
            }
            setLoading(false);
          };

          const handleCustomLogin = async (e) => {
            e.preventDefault();
            setLoading(true);
            setAuthError(null);

            try {
              if (username === 'احمد عبد الرحمن' && password === 'Shousha30') {
                const adminUser = {
                  uid: 'admin-1',
                  displayName: 'احمد عبد الرحمن',
                  role: 'admin'
                };
                setUser(adminUser);
                setIsAuthorized(true);
                localStorage.setItem('customUser', JSON.stringify(adminUser));
                setLoading(false);
                return;
              }

              const querySnapshot = await db.collection('users')
                .where('username', '==', username)
                .where('password', '==', password)
                .get();

              if (!querySnapshot.empty) {
                const userData = querySnapshot.docs[0].data();
                const customUser = {
                  uid: querySnapshot.docs[0].id,
                  displayName: userData.username,
                  role: userData.role || 'user'
                };
                setUser(customUser);
                setIsAuthorized(true);
                localStorage.setItem('customUser', JSON.stringify(customUser));
              } else {
                setAuthError('اسم المستخدم أو كلمة المرور غير صحيحة');
              }
            } catch (error) {
              console.error('Login error:', error);
              setAuthError('حدث خطأ أثناء تسجيل الدخول');
            }
            setLoading(false);
          };

          const handleLogout = () => {
            auth.signOut();
            localStorage.removeItem('customUser');
            setUser(null);
            setIsAuthorized(false);
            setClients([]);
          };

          const showToast = (message, type = 'success') => {
            setToast({ message, type, id: Date.now() });
            setTimeout(() => setToast(null), 3000);
          };

          const addClient = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.currentTarget);
            const name = formData.get('name');
            const total = parseFloat(formData.get('total'));

            if (!name || isNaN(total)) return;

            try {
              const initialTransaction = { amount: total, user: user.displayName, date: new Date().toISOString(), type: 'debt' };
              await db.collection('clients').add({
                name, total, paid: 0, history: [initialTransaction], 
                createdAt: firebase.firestore.FieldValue.serverTimestamp(), 
                createdBy: user.displayName
              });
              setIsAddModalOpen(false);
              showToast('تم إضافة العميل بنجاح');
            } catch (error) {
              console.error('Add client error:', error);
              showToast('حدث خطأ أثناء الإضافة', 'error');
            }
          };

          const handleTransaction = async (type) => {
            const val = parseFloat(amount);
            if (!selectedClient || isNaN(val) || val <= 0) return;

            try {
              const clientRef = db.collection('clients').doc(selectedClient.id);
              const newTransaction = { amount: val, user: user.displayName, date: new Date().toISOString(), type, ...(notes.trim() ? { notes: notes.trim() } : {}) };
              
              const updates = type === 'payment' 
                ? { paid: firebase.firestore.FieldValue.increment(val) } 
                : { total: firebase.firestore.FieldValue.increment(val) };
                
              await clientRef.update({ 
                ...updates, 
                history: firebase.firestore.FieldValue.arrayUnion(newTransaction) 
              });
              
              setIsPayModalOpen(false);
              setIsAddDebtModalOpen(false);
              setAmount('');
              setNotes('');
              showToast(type === 'payment' ? 'تم تسجيل الدفعة بنجاح' : 'تم إضافة الدين بنجاح');
            } catch (error) {
              console.error('Transaction error:', error);
              showToast('حدث خطأ أثناء العملية', 'error');
            }
          };

          const calculateRunningBalance = (history) => {
            let currentBalance = 0;
            const sortedHistory = [...(history || [])].sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
            return sortedHistory.map(h => {
              if (h.type === 'payment') currentBalance -= h.amount;
              else currentBalance += h.amount;
              return { ...h, balance: currentBalance };
            }).reverse();
          };

          if (loading) return (
            <div className="flex items-center justify-center h-screen bg-background text-brand">
              <Lucide.Loader2 className="w-12 h-12 animate-spin" />
            </div>
          );

          if (!isAuthorized) return (
            <div className="min-h-screen flex items-center justify-center p-4 bg-background">
              <div className="bg-surface p-8 rounded-[40px] card-shadow w-full max-w-md text-center border border-border">
                <img src={config.logo} className="w-20 h-20 mx-auto mb-6 rounded-2xl object-cover" />
                <h1 className="text-2xl font-black mb-2">{config.name}</h1>
                <p className="text-text-dim mb-8 text-sm">نظام إدارة الديون والتحصيل</p>
                {authError && <div className="bg-red-100 text-red-600 p-4 rounded-2xl mb-6 text-xs font-bold border border-red-200">{authError}</div>}
                
                <div className="flex bg-background p-1.5 rounded-2xl mb-8 border border-border">
                  <button onClick={() => setLoginMode('google')} className={`flex-1 py-2.5 rounded-xl font-bold text-sm transition-all ${loginMode === 'google' ? 'bg-brand text-white shadow-lg' : 'text-text-dim hover:bg-surface'}`}>جوجل</button>
                  <button onClick={() => setLoginMode('custom')} className={`flex-1 py-2.5 rounded-xl font-bold text-sm transition-all ${loginMode === 'custom' ? 'bg-brand text-white shadow-lg' : 'text-text-dim hover:bg-surface'}`}>يدوي</button>
                </div>

                {loginMode === 'google' ? (
                  <button onClick={handleGoogleLogin} className="w-full bg-brand text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-brand/20"><Lucide.Factory className="w-4 h-4" /> دخول بجوجل</button>
                ) : (
                  <form onSubmit={handleCustomLogin} className="space-y-4">
                    <input name="username" placeholder="اسم المستخدم" value={username} onChange={e => setUsername(e.target.value)} className="w-full bg-background p-4 rounded-xl outline-none border border-border focus:border-brand text-sm transition-all" required />
                    <input name="password" type="password" placeholder="كلمة المرور" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-background p-4 rounded-xl outline-none border border-border focus:border-brand text-sm transition-all" required />
                    <button type="submit" className="w-full bg-brand text-white py-4 rounded-xl font-bold shadow-xl shadow-brand/20 hover:bg-brand/90 transition-all">دخول</button>
                  </form>
                )}
              </div>
            </div>
          );

          const filteredClients = clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
          const totalDebt = clients.reduce((acc, c) => acc + ((c.total || 0) - (c.paid || 0)), 0);
          const totalPaid = clients.reduce((acc, c) => acc + (c.paid || 0), 0);

          return (
            <div className="min-h-screen pb-20">
              <header className="bg-surface border-b border-border sticky top-0 z-40 px-6 py-3 no-print">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <img src={config.logo} className="w-8 h-8 rounded-lg object-cover" />
                    <h1 className="text-lg font-black hidden sm:block">{config.name}</h1>
                  </div>
                  <div className="flex items-center gap-1">
                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 hover:bg-brand/10 rounded-xl transition-colors">{isDarkMode ? <Lucide.Sun className="w-5 h-5" /> : <Lucide.Moon className="w-5 h-5" />}</button>
                    <button onClick={handleLogout} className="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-colors"><Lucide.LogOut className="w-5 h-5" /></button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto p-6 space-y-6 no-print">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-surface p-6 rounded-3xl card-shadow border border-border group hover:border-brand/40 transition-all">
                    <div className="flex items-center gap-3 mb-2">
                      <div className="p-2 rounded-xl bg-blue-50 text-brand"><Lucide.TrendingUp className="w-5 h-5" /></div>
                      <p className="text-text-dim text-xs font-bold">إجمالي الديون</p>
                    </div>
                    <h2 className="text-2xl font-black text-brand">{totalDebt.toLocaleString()} <span className="text-xs font-medium">ج.م</span></h2>
                  </div>
                  <div className="bg-surface p-6 rounded-3xl card-shadow border border-border group hover:border-green-400/40 transition-all">
                    <div className="flex items-center gap-3 mb-2">
                      <div className="p-2 rounded-xl bg-green-50 text-green-600"><Lucide.Wallet className="w-5 h-5" /></div>
                      <p className="text-text-dim text-xs font-bold">إجمالي التحصيل</p>
                    </div>
                    <h2 className="text-2xl font-black text-green-600">{totalPaid.toLocaleString()} <span className="text-xs font-medium">ج.م</span></h2>
                  </div>
                  <div className="bg-surface p-6 rounded-3xl card-shadow border border-border group hover:border-yellow-400/40 transition-all">
                    <div className="flex items-center gap-3 mb-2">
                      <div className="p-2 rounded-xl bg-yellow-50 text-yellow-600"><Lucide.Users className="w-5 h-5" /></div>
                      <p className="text-text-dim text-xs font-bold">عدد العملاء</p>
                    </div>
                    <h2 className="text-2xl font-black">{clients.length}</h2>
                  </div>
                </div>

                <div className="flex flex-col sm:flex-row gap-3 items-center justify-between bg-surface p-4 rounded-2xl border border-border shadow-sm">
                  <div className="relative w-full sm:max-w-xs">
                    <Lucide.Search className="absolute right-3 top-1/2 -translate-y-1/2 text-text-dim w-4 h-4" />
                    <input placeholder="ابحث عن عميل..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-background rounded-xl py-2.5 pr-10 pl-3 text-sm outline-none text-text border border-border focus:border-brand transition-all placeholder:text-text-dim/60" />
                  </div>
                  <button onClick={() => setIsAddModalOpen(true)} className="w-full sm:w-auto bg-brand text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-brand/20 hover:bg-brand/90 transition-all"><Lucide.Plus className="w-4 h-4" /> إضافة عميل</button>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {filteredClients.map((c, i) => (
                    <motion.div layout key={c.id || `client-${i}`} className="bg-surface p-5 sm:p-6 rounded-3xl card-shadow border border-border hover:border-brand/30 transition-all group">
                      <div className="flex justify-between items-start mb-4">
                        <div className="flex items-center gap-3">
                          <div className="w-10 h-10 rounded-xl bg-blue-50 text-brand flex items-center justify-center group-hover:bg-brand group-hover:text-white transition-all"><Lucide.Users className="w-5 h-5" /></div>
                          <h3 className="text-lg font-black truncate max-w-[150px] sm:max-w-none">{c.name}</h3>
                        </div>
                        <button onClick={() => { setSelectedClientId(c.id); setIsHistoryOpen(true); }} className="p-2 bg-background rounded-lg text-text-dim hover:text-brand transition-colors"><Lucide.History className="w-4 h-4" /></button>
                      </div>
                      <div className="mb-6">
                        <p className="text-text-dim text-[10px] font-black mb-1 uppercase tracking-wider">المبلغ المتبقي</p>
                        <div className="text-2xl font-black text-brand">{((c.total || 0) - (c.paid || 0)).toLocaleString()} <span className="text-xs font-medium">ج.م</span></div>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => { setSelectedClientId(c.id); setIsPayModalOpen(true); }} className="flex-1 bg-green-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-green-600/20 hover:bg-green-700 transition-all">تحصيل</button>
                        <button onClick={() => { setSelectedClientId(c.id); setIsAddDebtModalOpen(true); }} className="flex-1 bg-blue-50 text-brand border border-brand/20 py-2.5 rounded-xl font-bold text-xs hover:bg-brand hover:text-white transition-all">دين جديد</button>
                      </div>
                    </motion.div>
                  ))}
                </div>
              </main>

              <AnimatePresence>
                {toast && (
                  <motion.div initial={{ y: 50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 50, opacity: 0 }} className={`fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-2xl z-[200] flex items-center gap-3 font-bold text-sm ${toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                    {toast.type === 'success' ? <Lucide.CheckCircle2 className="w-5 h-5" /> : <Lucide.AlertCircle className="w-5 h-5" />}
                    {toast.message}
                  </motion.div>
                )}
              </AnimatePresence>

              {/* Add Client Modal */}
              {isAddModalOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 no-print">
                  <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsAddModalOpen(false)} />
                  <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="relative bg-surface w-full max-w-sm rounded-3xl p-6 card-shadow">
                    <h3 className="text-xl font-black mb-4">إضافة عميل</h3>
                    <form onSubmit={addClient} className="space-y-4">
                      <input name="name" placeholder="الاسم" required className="w-full bg-background p-3 rounded-xl outline-none border border-transparent focus:border-brand text-sm" />
                      <input name="total" type="number" placeholder="المبلغ" required className="w-full bg-background p-3 rounded-xl outline-none border border-transparent focus:border-brand text-sm" />
                      <button type="submit" className="w-full bg-brand text-white py-3 rounded-xl font-bold text-sm">حفظ</button>
                    </form>
                  </motion.div>
                </div>
              )}

              {/* Pay/Debt Modal */}
              {(isPayModalOpen || isAddDebtModalOpen) && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 no-print">
                  <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => { setIsPayModalOpen(false); setIsAddDebtModalOpen(false); }} />
                  <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="relative bg-surface w-full max-w-sm rounded-3xl p-6 card-shadow text-center">
                    <h3 className="text-xl font-black mb-1">{isPayModalOpen ? 'تحصيل دفعة' : 'دين جديد'}</h3>
                    <p className="text-text-dim text-xs mb-4">{selectedClient?.name}</p>
                    <div className="space-y-3 mb-4">
                      <input type="number" value={amount} onChange={e => setAmount(e.target.value)} className="w-full bg-background p-4 rounded-2xl text-2xl font-black text-center outline-none" placeholder="0.00" autoFocus />
                      <textarea value={notes} onChange={e => setNotes(e.target.value)} className="w-full bg-background p-3 rounded-xl text-sm outline-none border border-transparent focus:border-brand resize-none h-20" placeholder="ملاحظات إضافية (اختياري)..." />
                    </div>
                    <button onClick={() => handleTransaction(isPayModalOpen ? 'payment' : 'debt')} className={`w-full py-3 rounded-xl font-bold text-white ${isPayModalOpen ? 'bg-green-600' : 'bg-brand'}`}>تأكيد</button>
                  </motion.div>
                </div>
              )}

              {/* History Modal */}
              {isHistoryOpen && selectedClient && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 print:p-0 print:static print:block">
                  <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 bg-black/60 backdrop-blur-sm no-print" onClick={() => setIsHistoryOpen(false)} />
                  <motion.div initial={{ y: 50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 50, opacity: 0 }} className="relative bg-surface w-full max-w-lg rounded-3xl max-h-[80vh] flex flex-col overflow-hidden card-shadow print:max-w-none print:shadow-none print:rounded-none print:max-h-none print:block">
                    <div className="p-5 border-b border-border flex justify-between items-center no-print">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-xl bg-blue-50 text-brand flex items-center justify-center">
                          <Lucide.User className="w-6 h-6" />
                        </div>
                        <div>
                          <h3 className="font-black">{selectedClient.name}</h3>
                          <p className="text-[10px] text-text-dim font-bold">سجل الحساب المالي المحدث لحظياً</p>
                        </div>
                      </div>
                      <button onClick={() => setIsHistoryOpen(false)} className="p-2 bg-background rounded-lg text-text-dim"><Lucide.X className="w-4 h-4" /></button>
                    </div>
                    <div id="history-content" className="flex-1 overflow-y-auto p-5 space-y-6 bg-surface text-text">
                      {/* Print Header */}
                      <div className="mb-8 border-b-4 border-brand pb-8 hidden print:block">
                        <div className="flex justify-between items-start gap-4">
                          <div className="text-right flex-1">
                            <h2 className="text-3xl font-black text-brand mb-2">{config.name}</h2>
                            <p className="text-sm text-text-dim font-bold leading-relaxed whitespace-pre-line">{config.info}</p>
                          </div>
                          <div className="flex flex-col items-center">
                            <img src={config.logo} className="w-24 h-24 rounded-xl object-cover border border-border" />
                          </div>
                        </div>
                        <div className="mt-10 text-center">
                          <div className="inline-block px-8 py-3 bg-brand text-white rounded-2xl font-black text-xl">كشف حساب مالي</div>
                        </div>
                      </div>

                      <div className="space-y-4">
                        <div className="overflow-hidden rounded-2xl border border-border">
                          <table className="w-full text-right text-sm">
                            <thead className="bg-background text-text-dim font-black border-b border-border">
                              <tr>
                                <th className="p-4">التاريخ</th>
                                <th className="p-4">المعاملة</th>
                                <th className="p-4">المبلغ</th>
                                <th className="p-4 bg-brand/5">الرصيد</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-border">
                              {calculateRunningBalance(selectedClient.history || []).map((h, i) => (
                                <tr key={i} className="hover:bg-brand/5 transition-colors">
                                  <td className="p-4 text-text-dim font-bold text-xs">{formatDate(h.date).split(',')[0]}</td>
                                  <td className="p-4">
                                    <div className="flex items-center gap-2">
                                      <div className={`w-2 h-2 rounded-full ${h.type === 'payment' ? 'bg-green-600' : 'bg-brand'}`}></div>
                                      <span className="font-bold">{h.type === 'payment' ? 'تحصيل' : 'دين'}</span>
                                    </div>
                                  </td>
                                  <td className={`p-4 font-black ${h.type === 'payment' ? 'text-green-600' : 'text-brand'}`}>
                                    {h.type === 'payment' ? '-' : '+'}{h.amount.toLocaleString()}
                                  </td>
                                  <td className="p-4 font-black text-text bg-brand/5">{h.balance?.toLocaleString()}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>

                      <div className="flex gap-2 no-print">
                        <button onClick={() => window.print()} className="flex-1 py-3 rounded-xl bg-brand text-white font-bold text-xs flex items-center justify-center gap-2 shadow-lg shadow-brand/20">
                          <Lucide.Printer className="w-4 h-4" /> طباعة كشف الحساب
                        </button>
                      </div>
                    </div>
                  </motion.div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
